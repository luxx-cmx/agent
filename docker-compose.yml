version: "3.9"

services:
  api:
    image: python:3.11-slim
    working_dir: /workspace/apps/api
    command: sh -c "pip install -e .[dev] && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      AGENT_CORE_DEV_JWT_TOKEN: agent-core-dev-token
    volumes:
      - .:/workspace
    ports:
      - "8000:8000"

  web:
    image: node:22-alpine
    working_dir: /workspace/apps/web
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_BEARER_TOKEN: agent-core-dev-token
    volumes:
      - .:/workspace
    ports:
      - "3000:3000"